{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow-sm border-0 mt-4 apme-auth-card">
      <div class="card-body p-4 p-md-5">

        
        <div class="text-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44"
               width="52" height="52" aria-hidden="true">
            <circle cx="17.5" cy="17.5" r="13.5"
                    fill="none" stroke="#3B82F6" stroke-width="2.2"/>
            <circle cx="17.5" cy="17.5" r="12.2"
                    fill="rgba(59,130,246,0.07)"/>
            <line x1="9.5" y1="11.5" x2="25.5" y2="11.5"
                  stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
            <line x1="9.5" y1="17.5" x2="25.5" y2="17.5"
                  stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
            <rect x="12.8" y="15.3" width="9.8" height="4.4" rx="2.2"
                  fill="rgba(59,130,246,0.18)"/>
            <circle cx="14.5" cy="17.5" r="1.8" fill="#3B82F6"/>
            <circle cx="17.9" cy="17.5" r="1.8" fill="#3B82F6"/>
            <circle cx="21.3" cy="17.5" r="1.8" fill="#3B82F6"/>
            <line x1="14.5" y1="17.5" x2="21.3" y2="17.5"
                  stroke="#3B82F6" stroke-width="1" stroke-dasharray="2.2 1.8" opacity="0.65"/>
            <line x1="9.5" y1="23.5" x2="22.5" y2="23.5"
                  stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
            <line x1="27.5" y1="27.5" x2="40" y2="40"
                  stroke="#3B82F6" stroke-width="3.4" stroke-linecap="round"/>
          </svg>
          <h4 class="fw-bold mt-3 mb-0" style="color:var(--navy)">Create Account</h4>
          <p class="small mt-1 mb-0" style="color:#7a8fa8">Join APME to start searching</p>
        </div>

        <form method="POST" novalidate>

          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-at"></i></span>
              <input type="text" id="username" name="username"
                     class="form-control" placeholder="my_username"
                     minlength="3" maxlength="30" required/>
            </div>
            <div class="form-text">3–30 characters, letters and numbers.</div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" name="email"
                     class="form-control" placeholder="you@example.com" required/>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" name="password"
                     class="form-control" placeholder="Min 6 characters"
                     minlength="6" required/>
              <button class="btn btn-outline-secondary" type="button" id="togglePwd"
                      style="border-color:rgba(152,193,217,.65)">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="form-text">At least 6 characters.</div>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-person-check me-2"></i>Create Account
          </button>
        </form>

        <hr style="border-color:rgba(152,193,217,.3)" class="my-4"/>
        <p class="text-center mb-0 small" style="color:#7a8fa8">
          Already have an account?
          <a href="{{ url_for('auth.login') }}" class="fw-semibold" style="color:var(--blue)">
            Sign in
          </a>
        </p>

      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('togglePwd').addEventListener('click', function () {
    const pwd  = document.getElementById('password');
    const icon = this.querySelector('i');
    pwd.type       = pwd.type === 'password' ? 'text' : 'password';
    icon.className = pwd.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
  });
</script>
{% endblock %}
